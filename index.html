<style>
    @import url('https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Orbitron:wght@400..900&family=Sigmar&display=swap');

    #view {
        width: 100%;
        height: 100%;
        left: 0px;
        top: 0px;
        border: 0px;
        transition: .8s all;
        position: absolute;
        opacity: 0;
    }
    body,html{
        overflow: hidden;
        background: #0a0a0c;
        overflow: hidden;
        background: #0a0a0c;
        width: 100vw;
        height: 100vh;
        position: absolute;
        margin:0px;
    }
    nav {
        position: absolute;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: end;
        width: 100%;
    }
    .n {
        font-style: normal;
        font-size: min(5vh,7vw);
        text-decoration: none;
        margin-left: 0.5vw;
        margin-top: 0.5vh;
        transition: 0.5s all;
    }
    .n span {
        font-family: "Alfa Slab One", serif;
        font-weight: 100;
        font-style: normal;
        letter-spacing: 3px;
    }

    .n:hover {
        transform: scale(105%);
    }

    #play {
        text-shadow: none !important;
        color: red;
        font-size: min(3vh,5vw);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-right: 1vw;
        outline: none;
        border-radius: 15px;
        background-color: red;
        height: 5vh;
    }

    #about {
        text-shadow: none !important;
        color: blue;
        outline: none;
        font-size: min(3vh,5vw);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-right: 1vw;
        border-radius: 15px;
        background-color: blue;
        height: 5vh;
    }

    #play[selected], #about[selected] {
        box-shadow: 0 0 30px;
    }

    .n[selected] {
        text-shadow: 0 0 15px;
        transform: scale(110%);
    }

    #c {
        font-size: 3vh;
        padding-left: 2vh;
        cursor: pointer;
        padding-right: 2vh;
        padding-top: 1vh;
        padding-bottom: 1vh;
        margin: 0.2vw;
        color: white; 
        border: 0px;
        font-family: "Orbitron", sans-serif;
        font-optical-sizing: auto;
        font-weight: 400;
        font-style: normal;
        transition: 0.5s all;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
    }
    
    #c img {
        height: 2.5vh;
    }
</style>

<nav>
    <a href="#home" class="n" style="margin-right: auto;"><span style="color:blue">X</span><span style="color:red">N</span></a>
    <a href="#about" class="n" id="about"><span id="c">About Us<img src="play.png"/></span></a>
    <a href="#join" class="n" id="play"><span id="c">Play<img src="play.png"/></span></a>
</nav>

<iframe id="view"></iframe>
<script src="particles.js"></script>

<script>
    let oldhash="";

    async function loadPage(url,d=800) {
        const v = document.getElementById('view');
        v.style.opacity = 0;
        
        setTimeout(async () => {
            v.src = url;
            window.location.hash=url.replace(".html","");
            
            v.onload=function(){
                v.style.opacity = 1;
            }

            oldhash=window.location.hash;
        }, d); 
    }

    function updateHash(){
        if (window.location.hash){
            if (window.location.hash!=oldhash)
                loadPage(window.location.hash.replace("#","")+".html",900);  
        } else {
            loadPage("home.html",900);    
        }
        for (let e of document.getElementsByClassName("n")){
            if (e.href.replace(window.location.origin,"").replace("/","").replace("index.html","")==window.location.hash){
                e.setAttribute("selected","true");
            } else {
                e.removeAttribute("selected");
            }
        }
        oldhash=window.location.hash;
    }

    window.addEventListener('hashchange', updateHash);

    updateHash();
    animationloop();
</script>
