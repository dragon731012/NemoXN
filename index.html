<style>
    @import url('https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Orbitron:wght@400..900&family=Sigmar&display=swap');

    #view {
        width: 100%;
        height: 100%;
        left: 0px;
        top: 0px;
        border: 0px;
        transition: .8s all;
        position: absolute;
        opacity: 0;
    }
    body,html{
        overflow: hidden;
        background: #0a0a0c;
        overflow: hidden;
        background: #0a0a0c;
        width: 100vw;
        height: 100vh;
        position: absolute;
        margin:0px;
    }
    nav {
        position: absolute;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: end;
        width: 100%;
    }
    .n {
        font-style: normal;
        font-size: min(5vh,7vw);
        text-decoration: none;
        margin-left: 0.5vw;
        margin-top: 0.5vh;
        transition: 0.5s all;
    }
    .n span {
        font-family: "Alfa Slab One", serif;
        font-weight: 100;
        font-style: normal;
        letter-spacing: 3px;
    }

    .n:hover {
        transform: scale(105%);
    }

    #play {
        text-shadow: none !important;
        color: blue;
        background: rgba(0,0,255,0.2);
        border-radius: 50%;
        font-size: min(3vh,5vw);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 3vw;
        margin-right: 0.5vw;
        height: 3vw;
    }

    #play[selected] {
        box-shadow: 0 0 30px;
    }

    .n[selected] {
        text-shadow: 0 0 15px;
        transform: scale(110%);
    }
</style>

<nav>
    <a href="#home" class="n" style="margin-right: auto;"><span style="color:blue">X</span><span style="color:red">N</span></a>
    <a href="#join" class="n" id="play"><div style="transform: scaleX(80%) translateX(0.15vw) translateY(-0.2vw);">▶</div></a>
</nav>

<iframe id="view"></iframe>
<script src="particles.js"></script>

<script>
    async function loadPage(url,d=800) {
        const v = document.getElementById('view');
        v.style.opacity = 0;
        
        setTimeout(async () => {
            v.src = url;
            window.location.hash=url.replace(".html","");
            
            v.onload=function(){
                v.style.opacity = 1;
            }
        }, d); 
    }

    function updateHash(){
        if (window.location.hash){
            loadPage(window.location.hash.replace("#","")+".html",900);  
        } else {
            loadPage("home.html",900);    
        }
        for (let e of document.getElementsByClassName("n")){
            if (e.href.replace(window.location.origin,"").replace("/","")==window.location.hash){
                e.setAttribute("selected","true");
            } else {
                e.removeAttribute("selected");
            }
        }
    }

    window.addEventListener('hashchange', updateHash);

    updateHash();
    animationloop();
</script>
