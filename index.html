<link rel="stylesheet" href="/main.css">

<div id="buttoncont">
    <button id="a" onclick="window.location.href='/about/'">About</button>
    <button id="p" onclick="window.location.href='/play/'">Play</button>
</div>

<div id="cont">
    <div id="main">Nemo<b id="n">XN</b></div>
</div>
<div id="cont2">
    <div id="main2">Nemo<b id="n2">XN</b></div>
</div>
<style>
    #main {
        color: blue;
        text-shadow: 0 0 10px;
    }

    button:hover {
        font-size: 4vh;
    }

    #a:hover {
        box-shadow: 0 0 10px blue;
    }

    #a {
        background: blue;
    }

    #p:hover {
        box-shadow: 0 0 10px red;
    }

    #p {
        background: red;
    }

    #n {
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    #n2 {
        text-shadow: 0 0 10px red;
    }

    #main2 {
        text-shadow: 0 0 0px;
    }

    #cont, #cont2 {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        font-size: 15vh;
        font-family: "Alfa Slab One", serif;
        font-weight: 100;
        font-style: normal;
        letter-spacing: 3px;
    }
    #cont2 {
        position: absolute;
        top: 0px;
        left: 0px;
        z-index: -9999;
    }
</style>
<script>
    const d = 7;
    const speed = 13;
    const wait = 1300;
    const e = document.getElementById("n");

    var val = -5;

    setInterval(()=>{
        e.style = "background: linear-gradient(to top right, rgba(255,0,0,1) 0%, rgba(255,0,0,1) "+(val-d)+"%, rgba(255,255,255,1) "+val+"%, rgba(255,0,0,1) "+(val+d)+"%, rgba(255,0,0,1) 100%);-webkit-background-clip: text;background-clip: text;-webkit-text-fill-color: transparent;"

        val+=0.5;

        if (val>100+d) {
            setTimeout(()=>{
                val = 0;
            },wait);
        }
    },speed);
</script>
